<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D 球体坐标系变换</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #1a1a2e; font-family: 'Segoe UI', sans-serif; }
  canvas { display: block; }
  #info {
    position: absolute; top: 10px; left: 10px; color: #e0e0e0;
    background: rgba(0,0,0,0.6); padding: 12px 16px; border-radius: 8px;
    font-size: 13px; line-height: 1.8; pointer-events: none; user-select: none;
  }
  #info .title { font-size: 15px; font-weight: 600; margin-bottom: 6px; color: #7ec8e3; }
  #info .section { margin-top: 6px; }
  #info .label { color: #f9a826; font-weight: 500; }
  #mode-indicator {
    position: absolute; top: 10px; right: 10px; color: #fff;
    background: rgba(0,0,0,0.6); padding: 8px 14px; border-radius: 6px;
    font-size: 13px; pointer-events: none; user-select: none;
  }
</style>
</head>
<body>
<div id="info">
  <div class="title">3D 球体坐标系变换</div>
  <div class="section"><span class="label">球体操控：</span></div>
  <div>左键拖拽 → 绕固定轴旋转</div>
  <div>右键拖拽 → 平移</div>
  <div>滚轮 → 缩放</div>
  <div class="section"><span class="label">视图操控 (Alt +)：</span></div>
  <div>Alt + 左键 → 绕固定轴旋转视图</div>
  <div>Alt + 右键 → 平移视图</div>
  <div>Alt + 滚轮 → 缩放视图</div>
  <div class="section" style="margin-top:8px;">
    <span style="color:#ff4444;">红线 X轴</span> &nbsp;
    <span style="color:#44ff44;">绿线 Y轴</span> &nbsp;
    <span style="color:#4488ff;">蓝线 Z轴</span>
  </div>
</div>
<div id="mode-indicator">就绪</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three';

// ==================== 场景初始化 ====================
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(6, 5, 8);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setClearColor(0x1a1a2e);
document.body.appendChild(renderer.domElement);

const modeIndicator = document.getElementById('mode-indicator');

// ==================== 灯光 ====================
const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
scene.add(ambientLight);
const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
dirLight.position.set(10, 15, 10);
scene.add(dirLight);
const pointLight = new THREE.PointLight(0x7ec8e3, 0.5, 50);
pointLight.position.set(-5, 8, -5);
scene.add(pointLight);

// ==================== 网格地面 ====================
const gridHelper = new THREE.GridHelper(20, 20, 0x444466, 0x2a2a4a);
scene.add(gridHelper);

// ==================== 世界坐标系 ====================
function createAxes(length, lineWidth) {
  const group = new THREE.Group();

  const axesData = [
    { dir: new THREE.Vector3(1, 0, 0), color: 0xff4444, label: 'X' },
    { dir: new THREE.Vector3(0, 1, 0), color: 0x44ff44, label: 'Y' },
    { dir: new THREE.Vector3(0, 0, 1), color: 0x4488ff, label: 'Z' },
  ];

  for (const { dir, color, label } of axesData) {
    // 正方向
    const pts = [new THREE.Vector3(0, 0, 0), dir.clone().multiplyScalar(length)];
    const geo = new THREE.BufferGeometry().setFromPoints(pts);
    const mat = new THREE.LineBasicMaterial({ color, linewidth: lineWidth });
    group.add(new THREE.Line(geo, mat));

    // 负方向（暗色）
    const ptsNeg = [new THREE.Vector3(0, 0, 0), dir.clone().multiplyScalar(-length * 0.5)];
    const geoNeg = new THREE.BufferGeometry().setFromPoints(ptsNeg);
    const matNeg = new THREE.LineBasicMaterial({ color, linewidth: lineWidth, opacity: 0.3, transparent: true });
    group.add(new THREE.Line(geoNeg, matNeg));

    // 箭头锥体
    const coneGeo = new THREE.ConeGeometry(0.06, 0.2, 8);
    const coneMat = new THREE.MeshBasicMaterial({ color });
    const cone = new THREE.Mesh(coneGeo, coneMat);
    cone.position.copy(dir.clone().multiplyScalar(length));

    // 旋转锥体使其指向正确方向
    if (dir.x === 1) cone.rotation.z = -Math.PI / 2;
    else if (dir.z === 1) cone.rotation.x = Math.PI / 2;
    // Y方向默认朝上，不需要旋转
    group.add(cone);

    // 文字标签 (用 Sprite)
    const canvas = document.createElement('canvas');
    canvas.width = 64;
    canvas.height = 64;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = '#' + color.toString(16).padStart(6, '0');
    ctx.font = 'bold 48px Arial';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(label, 32, 32);
    const texture = new THREE.CanvasTexture(canvas);
    const spriteMat = new THREE.SpriteMaterial({ map: texture, depthTest: false });
    const sprite = new THREE.Sprite(spriteMat);
    sprite.position.copy(dir.clone().multiplyScalar(length + 0.4));
    sprite.scale.set(0.4, 0.4, 0.4);
    group.add(sprite);
  }

  return group;
}

// 世界坐标系
const worldAxes = createAxes(10, 2);
scene.add(worldAxes);

// ==================== 球体及自身坐标系 ====================
const sphereGroup = new THREE.Group();

// 球体
const sphereGeo = new THREE.SphereGeometry(1.2, 64, 64);
const sphereMat = new THREE.MeshPhongMaterial({
  color: 0x3a86ff,
  transparent: true,
  opacity: 0.55,
  shininess: 80,
  specular: 0x444444,
});
const sphere = new THREE.Mesh(sphereGeo, sphereMat);
sphereGroup.add(sphere);

// 球体线框
const wireGeo = new THREE.SphereGeometry(1.22, 24, 24);
const wireMat = new THREE.MeshBasicMaterial({ color: 0x7ec8e3, wireframe: true, transparent: true, opacity: 0.15 });
sphereGroup.add(new THREE.Mesh(wireGeo, wireMat));

// 球体自身坐标系（较短）
const localAxes = createAxes(2.2, 1);
sphereGroup.add(localAxes);

scene.add(sphereGroup);

// ==================== 交互状态 ====================
const state = {
  // 球体变换
  spherePos: new THREE.Vector3(0, 1.5, 0),
  sphereScale: 1.0,
  sphereRotX: 0,
  sphereRotY: 0,
  sphereRotZ: 0,

  // 视图变换
  viewDist: camera.position.length(),
  viewRotX: Math.asin(camera.position.y / camera.position.length()), // 绕世界X轴
  viewRotY: Math.atan2(camera.position.x, camera.position.z),        // 绕世界Y轴
  viewPan: new THREE.Vector3(0, 0, 0), // 视图平移偏移

  // 鼠标状态
  isDragging: false,
  isAlt: false,
  button: -1,
  lastMouse: new THREE.Vector2(),
};

// 更新球体变换
function updateSphereTransform() {
  sphereGroup.position.copy(state.spherePos);
  sphereGroup.scale.setScalar(state.sphereScale);
  sphereGroup.rotation.set(state.sphereRotX, state.sphereRotY, state.sphereRotZ);
}

// 更新视图（相机）变换
function updateViewTransform() {
  const d = state.viewDist;
  const ry = state.viewRotY;
  const rx = state.viewRotX;

  // 球坐标系：先绕世界Y轴，再绕局部X轴
  camera.position.set(
    d * Math.sin(ry) * Math.cos(rx),
    d * Math.sin(rx),
    d * Math.cos(ry) * Math.cos(rx)
  );
  camera.position.add(state.viewPan);
  camera.lookAt(state.viewPan);
}

updateSphereTransform();
updateViewTransform();

// ==================== 鼠标事件 ====================
function getNDC(e) {
  return new THREE.Vector2(
    (e.clientX / window.innerWidth) * 2 - 1,
    -(e.clientY / window.innerHeight) * 2 + 1
  );
}

renderer.domElement.addEventListener('contextmenu', e => e.preventDefault());

renderer.domElement.addEventListener('mousedown', (e) => {
  state.isDragging = true;
  state.isAlt = e.altKey;
  state.button = e.button;
  state.lastMouse = getNDC(e);
  updateModeText();
});

renderer.domElement.addEventListener('mousemove', (e) => {
  if (!state.isDragging) return;
  const curr = getNDC(e);
  const dx = curr.x - state.lastMouse.x;
  const dy = curr.y - state.lastMouse.y;
  state.isAlt = e.altKey;
  updateModeText();

  if (state.isAlt) {
    // ---- 视图操控 ----
    if (state.button === 0) {
      // Alt + 左键：绕固定轴旋转视图
      state.viewRotY += dx * Math.PI;
      state.viewRotX += dy * Math.PI;
      state.viewRotX = Math.max(-Math.PI / 2 + 0.01, Math.min(Math.PI / 2 - 0.01, state.viewRotX));
    } else if (state.button === 2) {
      // Alt + 右键：平移视图
      const panSpeed = state.viewDist * 0.5;
      // 计算相机的右方向和上方向
      const forward = new THREE.Vector3();
      camera.getWorldDirection(forward);
      const right = new THREE.Vector3().crossVectors(forward, camera.up).normalize();
      const up = new THREE.Vector3().crossVectors(right, forward).normalize();
      state.viewPan.addScaledVector(right, -dx * panSpeed);
      state.viewPan.addScaledVector(up, dy * panSpeed);
    }
    updateViewTransform();
  } else {
    // ---- 球体操控 ----
    if (state.button === 0) {
      // 左键：绕固定轴旋转球体（绕世界Y轴和世界X轴）
      state.sphereRotY += dx * Math.PI;
      state.sphereRotX += dy * Math.PI;
    } else if (state.button === 2) {
      // 右键：平移球体
      const panSpeed = 3;
      const forward = new THREE.Vector3();
      camera.getWorldDirection(forward);
      const right = new THREE.Vector3().crossVectors(forward, camera.up).normalize();
      const up = new THREE.Vector3().crossVectors(right, forward).normalize();
      state.spherePos.addScaledVector(right, dx * panSpeed);
      state.spherePos.addScaledVector(up, dy * panSpeed);
    }
    updateSphereTransform();
  }

  state.lastMouse = curr;
});

renderer.domElement.addEventListener('mouseup', () => {
  state.isDragging = false;
  state.button = -1;
  modeIndicator.textContent = '就绪';
});

renderer.domElement.addEventListener('mouseleave', () => {
  state.isDragging = false;
  state.button = -1;
  modeIndicator.textContent = '就绪';
});

renderer.domElement.addEventListener('wheel', (e) => {
  e.preventDefault();
  const delta = e.deltaY > 0 ? 0.9 : 1.1;

  if (e.altKey) {
    // Alt + 滚轮：缩放视图
    state.viewDist *= delta;
    state.viewDist = Math.max(1, Math.min(50, state.viewDist));
    updateViewTransform();
  } else {
    // 滚轮：缩放球体
    state.sphereScale *= delta;
    state.sphereScale = Math.max(0.1, Math.min(10, state.sphereScale));
    updateSphereTransform();
  }
}, { passive: false });

function updateModeText() {
  if (state.isAlt) {
    if (state.button === 0) modeIndicator.textContent = '视图旋转中...';
    else if (state.button === 2) modeIndicator.textContent = '视图平移中...';
    else modeIndicator.textContent = '视图操控模式 (Alt)';
  } else {
    if (state.button === 0) modeIndicator.textContent = '球体旋转中...';
    else if (state.button === 2) modeIndicator.textContent = '球体平移中...';
    else modeIndicator.textContent = '球体操控模式';
  }
}

// ==================== 窗口大小调整 ====================
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ==================== 渲染循环 ====================
function animate() {
  requestAnimationFrame(animate);
  renderer.render(scene, camera);
}
animate();
</script>
</body>
</html>
